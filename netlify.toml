[build]
  publish = "build"
  command = "npm run build"
  functions = "netlify/functions"

[build.environment]
  CI = "false"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions."process-recurring-invoices"]
  schedule = "0 8 * * *"

[functions."generate-vat-reports"]
  schedule = "30 7 * * *"

[context.production]
  command = "npm run build"
